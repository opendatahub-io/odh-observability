apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{.OperatorName}}-webhook
  annotations:
    cert-manager.io/inject-ca-from: {{.OperatorNamespace}}/{{.OperatorName}}-webhook-cert
webhooks:
  - name: podmonitor-injector.opendatahub.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{.OperatorName}}-webhook
        namespace: {{.OperatorNamespace}}
        path: /mutate-prometheus-monitors
        port: 9443
    failurePolicy: Fail
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{.OperatorNamespace}}
            - kube-system
    rules:
      - apiGroups: ["monitoring.coreos.com"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["podmonitors"]
        scope: Namespaced
    sideEffects: None
  - name: servicemonitor-injector.opendatahub.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{.OperatorName}}-webhook
        namespace: {{.OperatorNamespace}}
        path: /mutate-prometheus-monitors
        port: 9443
    failurePolicy: Fail
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{.OperatorNamespace}}
            - kube-system
    rules:
      - apiGroups: ["monitoring.coreos.com"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["servicemonitors"]
        scope: Namespaced
    sideEffects: None
