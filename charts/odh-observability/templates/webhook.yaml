{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "odh-observability.fullname" . }}-webhook
  labels:
    {{- include "odh-observability.labels" . | nindent 4 }}
  {{- if .Values.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ .Values.certManager.certificateName }}
  {{- end }}
webhooks:
  - name: podmonitor-injector.opendatahub.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "odh-observability.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-prometheus-monitors
        port: {{ .Values.webhook.port }}
    failurePolicy: Fail
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{ .Release.Namespace }}
            - kube-system
    rules:
      - apiGroups: ["monitoring.coreos.com"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["podmonitors"]
        scope: Namespaced
    sideEffects: None
  - name: servicemonitor-injector.opendatahub.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "odh-observability.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-prometheus-monitors
        port: {{ .Values.webhook.port }}
    failurePolicy: Fail
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{ .Release.Namespace }}
            - kube-system
    rules:
      - apiGroups: ["monitoring.coreos.com"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["servicemonitors"]
        scope: Namespaced
    sideEffects: None
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "odh-observability.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "odh-observability.labels" . | nindent 4 }}
spec:
  ports:
    - name: webhook
      port: {{ .Values.webhook.port }}
      targetPort: webhook
      protocol: TCP
  selector:
    {{- include "odh-observability.selectorLabels" . | nindent 4 }}
{{- end }}
