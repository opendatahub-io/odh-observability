apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "odh-observability.fullname" . }}-manager
  labels:
    {{- include "odh-observability.labels" . | nindent 4 }}
rules:
  # Monitoring CR
  - apiGroups: ["services.platform.opendatahub.io"]
    resources: ["monitorings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["services.platform.opendatahub.io"]
    resources: ["monitorings/status", "monitorings/finalizers"]
    verbs: ["get", "update", "patch"]
  # COO / Prometheus
  - apiGroups: ["monitoring.rhobs"]
    resources: ["monitoringstacks", "thanosqueriers", "servicemonitors", "prometheusrules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Tempo
  - apiGroups: ["tempo.grafana.com"]
    resources: ["tempomonolithics", "tempostacks"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # OpenTelemetry
  - apiGroups: ["opentelemetry.io"]
    resources: ["opentelemetrycollectors", "instrumentations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Perses
  - apiGroups: ["perses.dev"]
    resources: ["perses", "persesdatasources", "persesdashboards"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Admission policies (built-in K8s resource, not a CRD)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingadmissionpolicies", "validatingadmissionpolicybindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Workloads
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Core resources
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "serviceaccounts", "namespaces", "nodes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # OpenShift routes
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # OLM operator conditions (read-only, for precondition checks)
  - apiGroups: ["operators.coreos.com"]
    resources: ["operatorconditions"]
    verbs: ["get", "list", "watch"]
  # CRD watch
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "odh-observability.fullname" . }}-manager
  labels:
    {{- include "odh-observability.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "odh-observability.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "odh-observability.fullname" . }}
    namespace: {{ .Release.Namespace }}
