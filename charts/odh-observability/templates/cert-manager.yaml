{{- if and .Values.webhook.enabled .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "odh-observability.fullname" . }}-selfsigned
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "odh-observability.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certManager.certificateName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "odh-observability.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "odh-observability.fullname" . }}-webhook.{{ .Release.Namespace }}.svc
    - {{ include "odh-observability.fullname" . }}-webhook.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "odh-observability.fullname" . }}-selfsigned
  secretName: {{ .Values.certManager.secretName }}
{{- end }}
